<h2>傷口照護原則</h2>
<p>正確的傷口照護能有效預防感染並促進傷口癒合。以下是一般傷口照護的基本原則。</p>

<h3>換藥步驟</h3>
<ol>
  <li>洗手或使用手部消毒液</li>
  <li>小心移除舊紗布</li>
  <li>以生理食鹽水清洗傷口</li>
  <li>觀察傷口狀況（紅腫、分泌物、癒合程度）</li>
  <li>依醫囑塗抹藥膏</li>
  <li>覆蓋無菌紗布並固定</li>
</ol>

<h3>感染警訊</h3>
<ul>
  <li>傷口周圍紅腫範圍擴大</li>
  <li>持續疼痛或疼痛加劇</li>
  <li>出現黃綠色膿性分泌物</li>
  <li>發燒</li>
  <li>傷口出現異味</li>
</ul>
