<h2>一般術後注意事項</h2>

<h3>飲食</h3>
<ul>
  <li>依醫囑漸進恢復飲食（清流質→半流質→軟質→正常飲食）</li>
  <li>多攝取高蛋白食物促進傷口癒合</li>
  <li>補充維生素C和鋅</li>
  <li>避免刺激性食物</li>
</ul>

<h3>活動</h3>
<ul>
  <li>術後儘早下床活動（預防血栓）</li>
  <li>避免搬運重物（通常建議術後4-6週內）</li>
  <li>依醫囑漸進增加活動量</li>
</ul>

<h3>傷口照護</h3>
<ul>
  <li>保持傷口清潔乾燥</li>
  <li>依醫囑定時換藥</li>
  <li>觀察傷口有無異常（紅腫熱痛、分泌物）</li>
  <li>按時回診拆線</li>
</ul>

<h3>回診時機</h3>
<ul>
  <li>依醫囑時間回診</li>
  <li>如有異常（高燒、傷口裂開、大量出血）應立即就醫</li>
</ul>
