<h2>鼻噴劑正確使用方式</h2>

<h3>使用步驟</h3>
<ol>
  <li>輕輕擤鼻涕，清潔鼻腔</li>
  <li>搖勻藥瓶</li>
  <li>頭部略前傾</li>
  <li>將噴嘴對準鼻腔外側壁（避免直對鼻中隔）</li>
  <li>按壓噴頭的同時輕輕吸氣</li>
  <li>避免噴完後用力吸鼻或打噴嚏</li>
</ol>

<h3>注意事項</h3>
<ul>
  <li><strong>類固醇鼻噴劑</strong>：需持續使用才有效果，通常1-2週見效</li>
  <li><strong>去充血鼻噴劑</strong>：不可連續使用超過3-5天（避免藥物性鼻炎）</li>
  <li>噴嘴定期清洗</li>
  <li>多人不共用同一瓶</li>
</ul>
