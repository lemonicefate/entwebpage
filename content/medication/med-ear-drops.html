<h2>耳滴劑正確使用方式</h2>

<h3>使用步驟</h3>
<ol>
  <li>洗手</li>
  <li>將藥水回溫至室溫（可用手握住藥瓶數分鐘）</li>
  <li>患耳朝上側躺</li>
  <li>成人：將耳廓向上後方拉；兒童：向下後方拉</li>
  <li>滴入醫囑的滴數</li>
  <li>保持側躺姿勢5-10分鐘</li>
  <li>可輕壓耳屏幫助藥水流入</li>
</ol>

<h3>注意事項</h3>
<ul>
  <li>使用前確認耳膜完整（耳膜穿孔時部分藥物不可使用）</li>
  <li>藥水不可與他人共用</li>
  <li>注意藥品保存期限</li>
</ul>
