<h2>抗生素正確使用</h2>

<h3>基本原則</h3>
<ul>
  <li><strong>遵醫囑使用</strong>：不自行購買或分享抗生素</li>
  <li><strong>完成療程</strong>：即使症狀改善也不可自行停藥</li>
  <li><strong>按時服藥</strong>：維持穩定的藥物濃度</li>
  <li><strong>不用於病毒感染</strong>：普通感冒、流感是病毒造成，抗生素無效</li>
</ul>

<h3>常見副作用</h3>
<ul>
  <li>腸胃不適（噁心、腹瀉）</li>
  <li>過敏反應（皮疹、搔癢）</li>
  <li>若出現嚴重過敏（呼吸困難、全身腫脹），應立即就醫</li>
</ul>

<h3>抗藥性的危害</h3>
<p>不當使用抗生素會讓細菌產生抗藥性，使未來感染更難治療。這是全球公共衛生的重大威脅。</p>
