<h2>什麼是糖尿病？</h2>
<p>糖尿病是一種慢性代謝性疾病，因胰島素分泌不足或作用異常，導致血糖長期偏高。</p>

<h3>常見症狀（三多一少）</h3>
<ul>
  <li>多喝（口渴）</li>
  <li>多尿</li>
  <li>多吃（容易飢餓）</li>
  <li>體重減輕</li>
</ul>

<h3>日常管理</h3>
<ul>
  <li>定期監測血糖</li>
  <li>均衡飲食、控制醣類攝取</li>
  <li>規律運動</li>
  <li>按時服藥或注射胰島素</li>
  <li>定期回診追蹤（糖化血色素 HbA1c）</li>
  <li>注意足部護理</li>
</ul>
