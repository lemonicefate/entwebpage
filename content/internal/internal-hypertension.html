<h2>什麼是高血壓？</h2>
<p>高血壓是指血壓持續高於正常值（收縮壓≥130mmHg或舒張壓≥80mmHg）的慢性疾病。高血壓通常沒有明顯症狀，但長期未控制會增加心臟病、中風、腎臟病的風險。</p>

<h3>血壓分級</h3>
<ul>
  <li><strong>正常</strong>：&lt;120/80 mmHg</li>
  <li><strong>血壓偏高</strong>：120-129/&lt;80 mmHg</li>
  <li><strong>第一期高血壓</strong>：130-139/80-89 mmHg</li>
  <li><strong>第二期高血壓</strong>：≥140/90 mmHg</li>
</ul>

<h3>生活調整建議</h3>
<ul>
  <li>減少鈉鹽攝取（每日&lt;6克）</li>
  <li>規律運動（每週至少150分鐘中等強度運動）</li>
  <li>維持健康體重</li>
  <li>限制酒精攝取</li>
  <li>戒菸</li>
  <li>規律量血壓並記錄</li>
</ul>
