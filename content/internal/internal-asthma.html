<h2>什麼是氣喘？</h2>
<p>氣喘是一種慢性氣道發炎疾病，氣道在受到刺激時會收縮、腫脹並產生過多黏液，導致呼吸困難。</p>

<h3>常見誘發因子</h3>
<ul>
  <li>過敏原（塵蟎、花粉、黴菌、寵物皮屑）</li>
  <li>呼吸道感染（感冒、流感）</li>
  <li>冷空氣、天氣變化</li>
  <li>運動</li>
  <li>空氣汙染、菸煙</li>
  <li>情緒壓力</li>
</ul>

<h3>正確使用吸入器</h3>
<ul>
  <li>使用前充分搖勻</li>
  <li>緩慢深呼氣後，開始吸入時按壓吸入器</li>
  <li>緩慢深吸氣，吸入後閉氣10秒</li>
  <li>使用類固醇吸入器後務必漱口</li>
</ul>
