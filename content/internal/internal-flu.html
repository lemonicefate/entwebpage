<h2>什麼是流感？</h2>
<p>流行性感冒（流感）是由流感病毒引起的急性呼吸道感染，與普通感冒不同，流感症狀較為嚴重，且可能引發嚴重併發症。</p>

<h3>流感 vs 感冒</h3>
<ul>
  <li><strong>流感</strong>：突然高燒、全身肌肉酸痛、極度疲倦</li>
  <li><strong>感冒</strong>：漸進發作、以鼻部症狀為主、較少發燒</li>
</ul>

<h3>預防方式</h3>
<ul>
  <li>每年接種流感疫苗（建議10月前完成）</li>
  <li>勤洗手、避免觸摸口鼻</li>
  <li>流行期間避免出入人潮擁擠場所</li>
  <li>維持良好免疫力（充足睡眠、均衡飲食、規律運動）</li>
</ul>
