<h2>什麼是感冒？</h2>
<p>普通感冒是由多種病毒（最常見為鼻病毒）引起的上呼吸道感染，通常症狀輕微，7-10天內可自行痊癒。</p>

<h3>常見症狀</h3>
<ul>
  <li>流鼻水、鼻塞</li>
  <li>喉嚨痛</li>
  <li>咳嗽</li>
  <li>輕微發燒</li>
  <li>全身倦怠</li>
</ul>

<h3>居家照護</h3>
<ul>
  <li>充分休息</li>
  <li>多補充水分</li>
  <li>症狀治療（退燒止痛藥、止咳藥）</li>
  <li>勤洗手、戴口罩避免傳染</li>
</ul>

<h3>何時應就醫？</h3>
<ul>
  <li>高燒超過39°C持續3天以上</li>
  <li>呼吸困難或胸痛</li>
  <li>症狀超過10天未改善或持續惡化</li>
  <li>嚴重頭痛、頸部僵硬</li>
</ul>
