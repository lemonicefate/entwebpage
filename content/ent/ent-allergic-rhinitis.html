<h2>什麼是過敏性鼻炎？</h2>
<p>過敏性鼻炎是鼻黏膜接觸到過敏原（如塵蟎、花粉、黴菌、寵物皮屑）後，免疫系統產生過度反應所引起的慢性鼻部疾病。</p>

<h3>常見症狀</h3>
<ul>
  <li>反覆打噴嚏（尤其晨起時）</li>
  <li>大量清澈水狀鼻涕</li>
  <li>鼻塞</li>
  <li>鼻子、眼睛、喉嚨搔癢</li>
  <li>黑眼圈（過敏性眼暈）</li>
</ul>

<h3>治療方式</h3>
<ul>
  <li><strong>避免過敏原</strong>：使用防蟎寢具、定期清洗、保持環境清潔</li>
  <li><strong>藥物治療</strong>：鼻噴類固醇、口服抗組織胺、去充血劑</li>
  <li><strong>免疫治療</strong>：嚴重者可考慮減敏治療</li>
  <li><strong>鼻腔沖洗</strong>：每日使用生理食鹽水沖洗</li>
</ul>
