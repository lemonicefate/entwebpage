<h2>什麼是扁桃腺炎？</h2>
<p>扁桃腺炎是位於喉嚨兩側的扁桃腺發生發炎感染，可由病毒或細菌引起，好發於兒童及青少年。</p>

<h3>常見症狀</h3>
<ul>
  <li>喉嚨劇烈疼痛</li>
  <li>吞嚥困難</li>
  <li>發燒、畏寒</li>
  <li>扁桃腺紅腫、可見白色膿點</li>
  <li>頸部淋巴結腫大</li>
  <li>口臭</li>
</ul>

<h3>治療方式</h3>
<ul>
  <li><strong>細菌性</strong>：口服抗生素（需完成整個療程）</li>
  <li><strong>病毒性</strong>：症狀治療（止痛、退燒、多休息）</li>
  <li><strong>手術</strong>：反覆發作（一年超過6-7次）可考慮扁桃腺切除術</li>
</ul>
