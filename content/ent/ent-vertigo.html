<h2>什麼是眩暈？</h2>
<p>眩暈是一種感覺自己或周圍環境在旋轉、搖晃的症狀，通常與內耳前庭系統的問題有關。</p>

<h3>常見類型</h3>
<ul>
  <li><strong>良性陣發性姿勢性眩暈（BPPV）</strong>：最常見，頭部姿勢改變時出現短暫眩暈</li>
  <li><strong>梅尼爾氏症</strong>：反覆眩暈發作，伴隨聽力下降、耳鳴、耳悶</li>
  <li><strong>前庭神經炎</strong>：突發性嚴重眩暈，通常在病毒感染後發生</li>
</ul>

<h3>何時應立即就醫？</h3>
<ul>
  <li>眩暈伴隨劇烈頭痛</li>
  <li>口齒不清、肢體無力或麻木</li>
  <li>視覺異常（複視、視野缺損）</li>
  <li>高燒</li>
  <li>持續嘔吐無法進食</li>
</ul>
