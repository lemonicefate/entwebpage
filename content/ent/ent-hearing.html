<h2>聽力保健</h2>
<p>聽力損失是全球常見的健康問題，可能由老化、噪音暴露、感染或遺傳等因素造成。及早發現並採取保護措施至關重要。</p>

<h3>聽力損失的警訊</h3>
<ul>
  <li>需要別人重複說話</li>
  <li>電視音量越開越大</li>
  <li>在吵雜環境中難以聽清對話</li>
  <li>耳鳴</li>
  <li>覺得別人說話含糊不清</li>
</ul>

<h3>保護聽力的方法</h3>
<ul>
  <li>避免長時間暴露於高分貝環境（超過85分貝）</li>
  <li>使用耳機時遵守「60/60法則」：音量不超過60%，每次不超過60分鐘</li>
  <li>在噪音環境中配戴耳塞或耳罩</li>
  <li>避免使用棉花棒清潔耳道</li>
  <li>定期接受聽力檢查</li>
</ul>
