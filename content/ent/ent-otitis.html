<h2>什麼是中耳炎？</h2>
<p>中耳炎是中耳腔（位於耳膜後方的空間）發生發炎或感染的疾病，是兒童最常見的感染性疾病之一。</p>

<h3>常見症狀</h3>
<ul>
  <li>耳朵疼痛（幼兒可能表現為拉扯耳朵、哭鬧不安）</li>
  <li>聽力下降、耳悶感</li>
  <li>發燒</li>
  <li>耳朵流膿（耳膜穿孔時）</li>
  <li>平衡感異常</li>
</ul>

<h3>治療方式</h3>
<ul>
  <li><strong>藥物治療</strong>：口服抗生素、止痛藥、耳滴劑</li>
  <li><strong>觀察等待</strong>：輕微症狀可先觀察48-72小時</li>
  <li><strong>手術治療</strong>：反覆發作或積液超過3個月，可考慮中耳通氣管置入術</li>
</ul>

<div class="faq-section">
  <h3>常見問題</h3>
  <div class="faq-item">
    <h4>中耳炎會影響聽力嗎？</h4>
    <p>急性中耳炎通常造成暫時性聽力下降，治療後多可恢復。但反覆或慢性中耳炎若未妥善治療，可能造成永久性聽力損害。</p>
  </div>
</div>
