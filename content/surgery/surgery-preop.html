<h2>手術前準備事項</h2>

<h3>術前檢查</h3>
<ul>
  <li>血液檢查（血型、凝血功能、肝腎功能）</li>
  <li>心電圖</li>
  <li>胸部X光</li>
  <li>麻醉科評估</li>
</ul>

<h3>術前注意事項</h3>
<ul>
  <li><strong>禁食</strong>：手術前8小時禁食（包括水和口香糖）</li>
  <li><strong>藥物</strong>：告知醫師所有正在服用的藥物（特別是抗凝血藥物）</li>
  <li><strong>停藥</strong>：依醫囑停用阿斯匹靈等抗凝血藥物（通常術前7天）</li>
  <li><strong>其他</strong>：手術當天勿化妝、摘除飾品、穿著寬鬆衣物</li>
</ul>
