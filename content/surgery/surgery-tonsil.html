<h2>扁桃腺切除術</h2>

<h3>手術適應症</h3>
<ul>
  <li>反覆扁桃腺炎（一年6-7次以上）</li>
  <li>扁桃腺肥大導致阻塞性睡眠呼吸中止症</li>
  <li>扁桃腺周圍膿瘍</li>
  <li>懷疑扁桃腺腫瘤</li>
</ul>

<h3>術後照護</h3>
<ul>
  <li><strong>飲食</strong>：術後1-2週以冰涼、軟質食物為主（冰淇淋、布丁、粥）</li>
  <li><strong>避免</strong>：熱食、硬食、辛辣刺激食物</li>
  <li><strong>疼痛管理</strong>：按時服用止痛藥</li>
  <li><strong>休息</strong>：術後建議休息1-2週</li>
  <li><strong>注意</strong>：術後7-10天傷口結痂脫落時可能有少量出血，若大量出血應立即就醫</li>
</ul>
