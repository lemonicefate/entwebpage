<h2>術後照護重點</h2>

<h3>一般原則</h3>
<ul>
  <li>按時服藥（抗生素、止痛藥）</li>
  <li>保持傷口清潔乾燥</li>
  <li>充分休息但適度活動</li>
  <li>均衡飲食、多補充蛋白質</li>
</ul>

<h3>回診追蹤</h3>
<ul>
  <li>依醫囑按時回診</li>
  <li>如有異常狀況提前就醫</li>
</ul>

<h3>術後異常警訊</h3>
<ul>
  <li>持續高燒（>38.5°C超過48小時）</li>
  <li>傷口大量出血或化膿</li>
  <li>劇烈疼痛且止痛藥無法緩解</li>
  <li>呼吸困難</li>
</ul>
