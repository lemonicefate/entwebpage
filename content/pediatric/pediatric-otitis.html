<h2>小兒中耳炎</h2>
<p>兒童因耳咽管較短、較水平，感冒後容易併發中耳炎。約有75%的兒童在3歲前至少經歷一次中耳炎。</p>

<h3>家長如何觀察？</h3>
<ul>
  <li>幼兒不會表達耳痛，可能表現為：拉扯耳朵、哭鬧不安、食慾下降、睡眠不穩</li>
  <li>發燒</li>
  <li>耳朵流出分泌物</li>
  <li>對聲音反應變差</li>
</ul>

<h3>預防方式</h3>
<ul>
  <li>哺餵母乳至少6個月</li>
  <li>避免讓嬰兒躺著喝奶瓶</li>
  <li>遠離二手菸環境</li>
  <li>按時接種肺炎鏈球菌疫苗</li>
  <li>感冒時及早治療</li>
</ul>
