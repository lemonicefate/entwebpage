<h2>更年期保健</h2>
<p>更年期通常發生在45-55歲之間，因卵巢功能逐漸衰退、雌激素分泌減少，身體會出現各種變化。</p>

<h3>常見症狀</h3>
<ul>
  <li>熱潮紅、盜汗</li>
  <li>睡眠障礙</li>
  <li>情緒波動、焦慮</li>
  <li>陰道乾澀</li>
  <li>骨質流失加速</li>
</ul>

<h3>保健建議</h3>
<ul>
  <li>規律運動（尤其負重運動，預防骨質疏鬆）</li>
  <li>均衡飲食，補充鈣質和維生素D</li>
  <li>維持適當體重</li>
  <li>定期接受骨密度檢測</li>
  <li>症狀嚴重時可與醫師討論荷爾蒙療法</li>
</ul>
