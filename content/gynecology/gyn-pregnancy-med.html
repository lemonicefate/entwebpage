<h2>孕期用藥注意事項</h2>
<p>懷孕期間，任何用藥都應先諮詢醫師。以下提供基本的孕期用藥安全資訊。</p>

<h3>基本原則</h3>
<ul>
  <li>就醫時務必告知醫師已懷孕或可能懷孕</li>
  <li>不自行購買服用成藥</li>
  <li>不隨意停用慢性病用藥（需與醫師討論）</li>
  <li>中藥也需諮詢醫師後使用</li>
</ul>

<h3>常見安全用藥</h3>
<ul>
  <li><strong>退燒止痛</strong>：普拿疼（Acetaminophen）為首選</li>
  <li><strong>避免使用</strong>：非類固醇消炎藥（NSAIDs，如Ibuprofen）在第三孕期應避免</li>
  <li><strong>抗生素</strong>：需由醫師依據安全性分級選用</li>
</ul>
