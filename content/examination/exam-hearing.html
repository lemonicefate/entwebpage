<h2>聽力檢查</h2>

<h3>常見聽力檢查方式</h3>
<ul>
  <li><strong>純音聽力檢查</strong>：最基本的聽力檢查，測試不同頻率的聽力閾值</li>
  <li><strong>中耳功能檢查（鼓室圖）</strong>：評估中耳功能和耳膜活動度</li>
  <li><strong>耳聲傳射檢查（OAE）</strong>：評估內耳外毛細胞功能</li>
  <li><strong>腦幹聽覺誘發電位（ABR）</strong>：評估聽覺神經傳導</li>
</ul>

<h3>檢查前注意事項</h3>
<ul>
  <li>檢查前避免長時間暴露噪音環境</li>
  <li>告知醫師目前使用的藥物</li>
  <li>如有耳部不適應先告知</li>
</ul>

<h3>建議檢查時機</h3>
<ul>
  <li>新生兒聽力篩檢</li>
  <li>感覺聽力下降時</li>
  <li>長期噪音暴露工作者（每年一次）</li>
  <li>65歲以上長者（每1-2年一次）</li>
</ul>
