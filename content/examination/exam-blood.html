<h2>血液檢查</h2>

<h3>常見檢查項目</h3>
<ul>
  <li><strong>全血球計數（CBC）</strong>：白血球、紅血球、血紅素、血小板</li>
  <li><strong>肝功能</strong>：GOT、GPT、膽紅素</li>
  <li><strong>腎功能</strong>：肌酐酸、血中尿素氮</li>
  <li><strong>血糖</strong>：空腹血糖、糖化血色素</li>
  <li><strong>血脂</strong>：總膽固醇、三酸甘油酯、HDL、LDL</li>
</ul>

<h3>抽血前注意事項</h3>
<ul>
  <li>空腹檢查需禁食8-12小時（可喝少量白開水）</li>
  <li>告知正在服用的藥物</li>
  <li>前一晚避免高脂飲食和飲酒</li>
  <li>檢查當天保持正常作息</li>
</ul>
