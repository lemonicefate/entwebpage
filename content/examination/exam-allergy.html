<h2>過敏原檢測</h2>

<h3>檢測方式</h3>
<ul>
  <li><strong>抽血檢測（特異性IgE）</strong>：一次可檢測多種過敏原，適合各年齡層</li>
  <li><strong>皮膚點刺試驗</strong>：將少量過敏原液滴在皮膚上觀察反應</li>
  <li><strong>貼膚試驗</strong>：針對接觸性皮膚過敏的檢測</li>
</ul>

<h3>常見過敏原類別</h3>
<ul>
  <li><strong>吸入性</strong>：塵蟎、花粉、黴菌、貓狗皮屑、蟑螂</li>
  <li><strong>食物性</strong>：牛奶、蛋白、花生、海鮮、小麥</li>
</ul>

<h3>檢測後的建議</h3>
<ul>
  <li>根據結果調整生活環境（如防蟎寢具）</li>
  <li>避免接觸已確認的過敏原</li>
  <li>與醫師討論是否需要減敏治療</li>
</ul>
