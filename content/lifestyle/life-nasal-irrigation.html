<h2>鼻腔沖洗指南</h2>

<h3>適用對象</h3>
<ul>
  <li>過敏性鼻炎患者</li>
  <li>慢性鼻竇炎患者</li>
  <li>鼻部手術後復原</li>
  <li>空氣品質不良時的日常保健</li>
</ul>

<h3>沖洗步驟</h3>
<ol>
  <li>準備沖洗器具和生理食鹽水（0.9%）</li>
  <li>水溫接近體溫（約37°C）</li>
  <li>身體前傾，頭部略微向一側傾斜</li>
  <li>將沖洗液緩慢注入上方鼻孔</li>
  <li>液體會從另一側鼻孔或口腔流出</li>
  <li>輕輕擤出殘餘液體</li>
  <li>換另一側重複</li>
</ol>

<h3>注意事項</h3>
<ul>
  <li>必須使用煮沸冷卻後的水或生理食鹽水</li>
  <li>不可使用自來水（可能含有阿米巴原蟲）</li>
  <li>沖洗器具使用後清潔晾乾</li>
  <li>鼻腔完全阻塞時不要強行沖洗</li>
</ul>
