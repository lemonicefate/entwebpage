<h2>噪音防護</h2>

<h3>噪音對聽力的影響</h3>
<p>持續暴露於85分貝以上的噪音環境會逐漸損傷內耳的毛細胞，造成永久性聽力損失。</p>

<h3>常見噪音分貝參考</h3>
<ul>
  <li>正常交談：60 dB</li>
  <li>吸塵器：75 dB</li>
  <li>交通噪音：85 dB ⚠️ 危險閾值</li>
  <li>電動工具：95 dB</li>
  <li>演唱會：110 dB</li>
  <li>鞭炮：150 dB</li>
</ul>

<h3>防護建議</h3>
<ul>
  <li>在噪音環境中配戴耳塞或耳罩</li>
  <li>使用耳機時控制音量（不超過最大音量的60%）</li>
  <li>每聽60分鐘休息10分鐘</li>
  <li>儘量遠離噪音源</li>
  <li>工作場所噪音超標應向雇主反映</li>
</ul>
