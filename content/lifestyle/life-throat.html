<h2>喉嚨保養</h2>

<h3>日常保養建議</h3>
<ul>
  <li>多喝溫水，保持喉部濕潤</li>
  <li>避免大聲喊叫或長時間高聲說話</li>
  <li>說話時使用腹式呼吸支撐</li>
  <li>避免頻繁清喉嚨（改用小口喝水代替）</li>
  <li>戒菸、避免二手菸</li>
  <li>減少酒精和咖啡因攝取</li>
</ul>

<h3>聲音異常的警訊</h3>
<ul>
  <li>聲音嘶啞超過2週</li>
  <li>說話時疼痛</li>
  <li>聲音突然改變</li>
  <li>吞嚥困難或異物感</li>
</ul>
<p>如有以上症狀，建議儘早就醫檢查，排除聲帶結節、息肉或其他病變。</p>
