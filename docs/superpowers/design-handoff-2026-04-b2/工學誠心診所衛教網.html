<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>工學誠心診所 · 衛教專區</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet"/>
<style>
  :root {
    --fg: #0f2a42;
    --teal: #0e7c7b;
    --teal-2: #4a9e94;
    --bg: #fff;
    --muted: #56706c;
    --base-size: 16px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg);
    font-family: 'Noto Sans TC', -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    color: var(--fg); font-size: var(--base-size);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1, h2, h3, h4 { font-family: 'Noto Sans TC', sans-serif; text-wrap: pretty; }
  button:focus-visible, a:focus-visible { outline: 2px solid #f2c94c; outline-offset: 2px; }

  /* CVD (色弱/色盲) safe mode — Okabe–Ito palette swaps */
  html[data-cvd="on"] {
    /* Re-map the two most confusable category tones (red-orange & green)
       to CVD-safe blue / vermillion / sky-blue. Teal, orange, gold survive. */
    --cvd-red:    #0072B2; /* 腸胃 (原 #d96757) → blue */
    --cvd-green:  #CC79A7; /* 營養/長者 (原 #7aa83b) → reddish-purple */
    --cvd-amber:  #E69F00; /* warm amber replaces olive-green */
  }
  html[data-cvd="on"] [data-cvd-tone="red"]   { background-color: var(--cvd-red) !important; color: #fff !important; }
  html[data-cvd="on"] [data-cvd-tone="green"] { background-color: var(--cvd-green) !important; color: #fff !important; }
  html[data-cvd="on"] [data-cvd-text="red"]   { color: var(--cvd-red) !important; }
  html[data-cvd="on"] [data-cvd-text="green"] { color: var(--cvd-green) !important; }
  html[data-cvd="on"] [data-cvd-bg="red"]     { background-color: #e6f0fb !important; }
  html[data-cvd="on"] [data-cvd-bg="green"]   { background-color: #f7e9f3 !important; }

  /* Shape cues always on for traffic-light groups (never rely on hue alone) */
  .tl-shape { font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 18px; line-height: 1; }

  /* Floating A11y button (always visible regardless of tweaks) */
  .a11y-fab {
    position: fixed; left: 20px; bottom: 20px; z-index: 998;
    background: #fff; border: 1px solid #eaf2ef; border-radius: 999px;
    padding: 10px 16px 10px 12px; font-size: 13px; font-weight: 600; color: #0f2a42;
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    box-shadow: 0 8px 20px -10px rgba(15,42,66,0.25);
    font-family: 'Noto Sans TC', sans-serif;
  }
  .a11y-fab:hover { background: #f5faf8; }
  .a11y-fab .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5d2; box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px #9ab3af; }
  .a11y-fab.on .dot { background: #0e7c7b; box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px #0e7c7b; }
  .a11y-fab.on { background: #e7f3f1; border-color: #0e7c7b; color: #0e7c7b; }

  /* ═══════════════════ RESPONSIVE LAYER ═══════════════════
     Strategy: All desktop layout lives in inline styles (fine for 1280+).
     We add class markers (`r-*`) to key wrappers; media queries below
     override those wrappers' grid/flex properties via !important.
     ─────────────────────────────────────────────────────── */

  .container { max-width: 1200px; margin: 0 auto; }

  /* TABLET ≤1023px ───────────────────────────────────────── */
  @media (max-width: 1023px) {
    .container { padding-left: 20px !important; padding-right: 20px !important; }

    /* Navigation — hide desktop nav, show hamburger */
    .r-nav-primary { display: none !important; }
    .r-nav-topstrip { display: none !important; }
    .r-nav-hamburger { display: grid !important; }
    .r-nav-grid { grid-template-columns: auto 1fr auto !important; gap: 12px !important; padding: 10px 20px !important; }
    .r-cta-cluster .r-cta-text { display: none !important; }

    /* Hero — stack vertically */
    .r-hero-grid { grid-template-columns: 1fr !important; gap: 32px !important; padding: 48px 20px 56px !important; }
    .r-hero-illus { display: none !important; } /* illustration collage hides on tablet */
    .r-hero-stats { flex-wrap: wrap !important; gap: 20px !important; }

    /* Featured: 1 big + 2 medium → 1 column, big first */
    .r-feat-grid { grid-template-columns: 1fr 1fr !important; gap: 16px !important; }
    .r-feat-big { grid-column: 1 / -1 !important; min-height: 320px !important; }

    /* Categories 4-col → 2-col */
    .r-cat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 14px !important; }

    /* Mega menu 4-col → 2-col (rarely seen on tablet since hamburger) */
    .r-mega-grid { grid-template-columns: repeat(2, 1fr) !important; }

    /* Latest 3-col → 2-col */
    .r-latest-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .r-latest-grid > a:nth-child(n+5) { border-top: 1px solid #eaf2ef !important; }

    /* Doctors 4-col → 2-col */
    .r-docs-grid { grid-template-columns: repeat(2, 1fr) !important; }

    /* Info section */
    .r-info-grid { grid-template-columns: 1fr !important; gap: 28px !important; }

    /* FAQ section */
    .r-faq-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .r-faq-grid > div:first-child { position: static !important; }

    /* Footer: 4-col → 2-col */
    .r-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }

    /* Article list: sidebar on top */
    .r-list-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .r-list-sidebar { position: static !important; }

    /* Article: TOC hides on tablet */
    .r-article-grid { grid-template-columns: 1fr !important; }
    .r-article-toc { display: none !important; }

    /* Article body */
    .r-article-body { max-width: 100% !important; }

    /* HeroSearch search box */
    .r-hero-search { max-width: 100% !important; }
    .r-hero-search-cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .r-hero-search-top { grid-template-columns: 1fr !important; gap: 28px !important; }

    /* Hero section paddings */
    .r-hero-pad { padding: 48px 20px 56px !important; }

    /* Section paddings */
    .r-section { padding-top: 56px !important; padding-bottom: 56px !important; }

    /* Traffic-light table adjust */
    .r-tl-row { grid-template-columns: 36px 80px 1fr !important; }
    .r-tl-row > :nth-child(4) { grid-column: 1 / -1 !important; padding-left: 116px; margin-top: 2px; color: #56706c; }
  }

  /* MOBILE ≤639px ────────────────────────────────────────── */
  @media (max-width: 639px) {
    html { font-size: 15px; }

    .container { padding-left: 16px !important; padding-right: 16px !important; }
    .r-nav-grid { padding: 10px 16px !important; gap: 8px !important; }
    .r-logo-sub { display: none !important; }
    .r-logo-title { font-size: 16px !important; }

    /* Hero */
    .r-hero-grid { padding: 40px 16px 48px !important; gap: 24px !important; }
    .r-hero-h1 { font-size: 32px !important; line-height: 1.2 !important; }
    .r-hero-p { font-size: 16px !important; }
    .r-hero-stats { gap: 16px !important; padding-top: 20px !important; margin-top: 28px !important; }
    .r-hero-stats > div { min-width: 45% !important; }

    /* Featured → single column */
    .r-feat-grid { grid-template-columns: 1fr !important; }
    .r-feat-big { min-height: 260px !important; padding: 24px !important; }
    .r-feat-med { min-height: auto !important; padding: 22px !important; }

    /* Categories → 1 or 2 depending on density; 2 col narrow works */
    .r-cat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
    .r-cat-tile { padding: 16px !important; min-height: 140px !important; }
    .r-cat-tile-name { font-size: 15px !important; margin-top: 12px !important; }
    .r-cat-tile-desc { display: none !important; }
    .r-cat-tile-arrow { display: none !important; }

    /* Latest → 1 col */
    .r-latest-grid { grid-template-columns: 1fr !important; }
    .r-latest-grid > a { border-right: none !important; border-bottom: 1px solid #eaf2ef !important; border-top: none !important; }
    .r-latest-grid > a:last-child { border-bottom: none !important; }

    /* Doctors → 1 col */
    .r-docs-grid { grid-template-columns: 1fr !important; gap: 14px !important; }

    /* Section paddings tighter */
    .r-section { padding-top: 44px !important; padding-bottom: 44px !important; }

    /* Section header */
    .r-section-head-title { font-size: 26px !important; }

    /* Footer stack */
    .r-footer-grid { grid-template-columns: 1fr !important; gap: 24px !important; }

    /* Article list cards — stack icon + text vertically */
    .r-list-card { flex-direction: column !important; }
    .r-list-card > :first-child { width: 56px !important; height: 56px !important; }

    /* Article body */
    .r-article-pad { padding: 32px 16px !important; }
    .r-article-h1 { font-size: 26px !important; line-height: 1.3 !important; }
    .r-article-hero-grid { grid-template-columns: 1fr !important; }

    /* Hero Search mobile */
    .r-hero-search-flex { flex-wrap: wrap !important; gap: 6px !important; }
    .r-hero-search-flex input { min-width: 100% !important; order: -1 !important; padding: 12px 8px !important; }

    /* CTA cluster on mobile — hide search icon, keep LINE */
    .r-cta-cluster .r-cta-search { display: none !important; }

    /* Tweaks panel full-width */
    .tweaks-panel { left: 12px; right: 12px; bottom: 12px; width: auto !important; }

    /* A11y FAB smaller on mobile */
    .a11y-fab { padding: 8px 12px 8px 10px; font-size: 12px; }

    /* Traffic-light table → fully stacked */
    .r-tl-row { grid-template-columns: 36px 1fr !important; row-gap: 2px !important; }
    .r-tl-row > :nth-child(3), .r-tl-row > :nth-child(4) {
      grid-column: 2 / -1 !important; padding-left: 0 !important; margin-top: 0 !important;
    }

    /* TopStrip always hidden on tablet already */
  }

  /* Mobile nav drawer */
  .r-nav-hamburger { display: none; }
  .mobile-drawer {
    position: fixed; inset: 0; background: rgba(15,42,66,0.4); z-index: 100;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .mobile-drawer.open { opacity: 1; pointer-events: auto; }
  .mobile-drawer-panel {
    position: absolute; top: 0; right: 0; bottom: 0; width: min(86vw, 360px);
    background: #fff; transform: translateX(100%); transition: transform .25s ease-out;
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .mobile-drawer.open .mobile-drawer-panel { transform: translateX(0); }

  .topic-card:hover { transform: translateY(-3px); box-shadow: 0 16px 30px -20px rgba(15,42,66,0.2); }
  .feat-med:hover { transform: translateY(-3px); box-shadow: 0 16px 30px -20px rgba(15,42,66,0.18); }
  .cat-tile:hover { transform: translateY(-2px); box-shadow: 0 10px 22px -14px rgba(15,42,66,0.18); }
  .latest-row:hover { background: #f5faf8; }

  /* Scale mode */
  html.senior { --base-size: 19px; }
  html.senior h1 { letter-spacing: 0 !important; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 999;
    background: #fff; border-radius: 16px; padding: 18px 20px;
    box-shadow: 0 20px 40px -16px rgba(15,42,66,0.25), 0 0 0 1px #eaf2ef;
    width: 300px; font-size: 13px;
  }
  .tweaks-panel h4 { margin: 0 0 12px; font-size: 13px; letter-spacing: 0.1em; color: #4a9e94; text-transform: uppercase; }
  .tweaks-row { margin-bottom: 14px; }
  .tweaks-row label { display: block; font-weight: 600; color: #0f2a42; margin-bottom: 6px; }
  .tweaks-seg { display: flex; gap: 4px; background: #f5faf8; border-radius: 10px; padding: 3px; }
  .tweaks-seg button {
    flex: 1; border: 0; background: transparent; padding: 7px 10px; border-radius: 8px;
    font-size: 12px; font-weight: 500; cursor: pointer; color: #435754;
  }
  .tweaks-seg button.on { background: #0e7c7b; color: #fff; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/navbar.jsx"></script>
<script type="text/babel" src="components/heroes.jsx"></script>
<script type="text/babel" src="components/sections.jsx"></script>
<script type="text/babel" src="components/pages.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "big",
  "fontScale": "normal",
  "showDoctors": true,
  "showSeasonal": true,
  "cvdMode": true
}/*EDITMODE-END*/;

function App() {
  const [route, setRoute] = React.useState(() => localStorage.getItem('gx_route') || 'home');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('gx_route', route); window.scrollTo(0,0); }, [route]);

  // Apply font scale globally
  React.useEffect(() => {
    document.documentElement.classList.toggle('senior', tweaks.fontScale === 'senior');
  }, [tweaks.fontScale]);

  // Apply CVD mode synchronously during render so Proxy reads see current value
  if (typeof document !== 'undefined') {
    if (tweaks.cvdMode) document.documentElement.setAttribute('data-cvd', 'on');
    else document.documentElement.removeAttribute('data-cvd');
  }

  // Tweaks host protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    setTweaks(prev => ({ ...prev, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const onNavigate = (r) => {
    if (r === 'appointment' || r === 'search' || r === 'doctors') { setRoute('home'); return; }
    setRoute(r);
  };

  const Hero = tweaks.heroVariant === 'search' ? HeroSearch
             : tweaks.heroVariant === 'categories' ? HeroCategories
             : HeroBig;

  return (
    <>
      <Navbar current={route === 'list' ? 'edu' : ''} onNavigate={onNavigate}/>

      {route === 'home' && (
        <>
          <Hero onNavigate={onNavigate}/>
          <FeaturedSection onNavigate={onNavigate} showSeasonal={tweaks.showSeasonal}/>
          {tweaks.heroVariant !== 'categories' && <CategoriesSection onNavigate={onNavigate}/>}
          <LatestSection onNavigate={onNavigate}/>
          <DoctorsSection onNavigate={onNavigate} showDoctors={tweaks.showDoctors}/>
          <FaqSection/>
          <InfoSection/>
        </>
      )}
      {route === 'list' && <ListPage onNavigate={onNavigate}/>}
      {route === 'article' && <ArticlePage onNavigate={onNavigate}/>}

      <Footer/>

      <button
        className={`a11y-fab ${tweaks.cvdMode ? 'on' : ''}`}
        onClick={() => updateTweak('cvdMode', !tweaks.cvdMode)}
        title="切換色弱友善模式 / Color-vision safe mode"
        aria-pressed={tweaks.cvdMode}
      >
        <span className="dot" aria-hidden="true"/>
        色弱友善模式{tweaks.cvdMode ? ' · 已開啟' : ''}
      </button>

      {editMode && (
        <div className="tweaks-panel" data-screen-label="Tweaks">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <h4 style={{ margin: 0 }}>Tweaks</h4>
            <button onClick={() => setEditMode(false)} style={{ background: 'transparent', border: 0, cursor: 'pointer', color: '#8aa3a0' }}>
              <Icon.X style={{ width: 16, height: 16 }}/>
            </button>
          </div>

          <div className="tweaks-row">
            <label>Hero 版型</label>
            <div className="tweaks-seg">
              {[['big','大圖'],['search','搜尋優先'],['categories','分類優先']].map(([k,t]) => (
                <button key={k} className={tweaks.heroVariant===k?'on':''} onClick={() => updateTweak('heroVariant', k)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <label>字體大小</label>
            <div className="tweaks-seg">
              {[['normal','標準'],['senior','長輩友善']].map(([k,t]) => (
                <button key={k} className={tweaks.fontScale===k?'on':''} onClick={() => updateTweak('fontScale', k)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <label>顯示醫師團隊</label>
            <div className="tweaks-seg">
              {[[true,'顯示'],[false,'隱藏']].map(([k,t]) => (
                <button key={String(k)} className={tweaks.showDoctors===k?'on':''} onClick={() => updateTweak('showDoctors', k)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <label>精選上的季節專題標</label>
            <div className="tweaks-seg">
              {[[true,'顯示'],[false,'隱藏']].map(([k,t]) => (
                <button key={String(k)} className={tweaks.showSeasonal===k?'on':''} onClick={() => updateTweak('showSeasonal', k)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <label>色弱友善模式</label>
            <div className="tweaks-seg">
              {[[false,'關閉'],[true,'開啟']].map(([k,t]) => (
                <button key={String(k)} className={tweaks.cvdMode===k?'on':''} onClick={() => updateTweak('cvdMode', k)}>{t}</button>
              ))}
            </div>
          </div>

          <div style={{ marginTop: 4, padding: '10px 12px', background: '#f5faf8', borderRadius: 8, fontSize: 11, color: '#56706c', lineHeight: 1.5 }}>
            在首頁試試不同 Hero 版型,或切到文章頁看閱讀體驗。
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
