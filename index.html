<!DOCTYPE html>
<html lang="zh-TW" class="font-normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>誠心醫療體系工學診所衛教專區</title>
  <meta name="description" content="誠心醫療體系工學診所衛教專區 — 提供耳鼻喉科、內科、外科等專業衛教資訊，協助您了解疾病與健康照護知識。">
  <meta name="keywords" content="衛教,耳鼻喉科,診所,健康教育,鼻竇炎,中耳炎,過敏性鼻炎,工學診所,誠心醫療">
  <meta name="author" content="誠心醫療體系工學診所">

  <!-- Open Graph -->
  <meta property="og:title" content="誠心醫療體系工學診所衛教專區">
  <meta property="og:description" content="專業醫療衛教資訊，涵蓋耳鼻喉科、內科、外科等多科別健康知識。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">

  <!-- Fonts: Noto Serif TC (headings), LXGW WenKai (body), Noto Sans TC (UI), IBM Plex Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./css/style.css">

  <!-- Google Analytics 4（條件式載入：僅在 CONFIG.gaId 非空時啟用） -->
  <script>
    // GA 腳本由 content.js 載入後，在 app.js 中條件式初始化
    // 此處僅定義 dataLayer，實際 gtag.js 在 app.js 中動態插入
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
  </script>

  <!-- Schema.org 結構化資料 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MedicalWebPage",
    "name": "誠心醫療體系工學診所衛教專區",
    "description": "提供耳鼻喉科、內科、外科等專業衛教資訊，協助您了解疾病與健康照護知識。",
    "publisher": {
      "@type": "MedicalOrganization",
      "name": "誠心醫療體系工學診所",
      "medicalSpecialty": "Otolaryngology"
    },
    "about": {
      "@type": "MedicalSpecialty",
      "name": "耳鼻喉科"
    },
    "inLanguage": "zh-TW",
    "audience": {
      "@type": "PatientAudience",
      "audienceType": "患者與一般民眾"
    }
  }
  </script>
</head>
<body>

  <!-- ===== 頂部列 (Top Bar) ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="開啟選單">☰</button>
      <img src="./assets/logo.jpg" alt="誠心醫療體系 ALL HEART MEDICAL GROUP" class="topbar-logo">
      <span class="topbar-logo-divider" aria-hidden="true"></span>
      <span class="topbar-title">工學診所衛教專區</span>
      <span class="topbar-title-short">衛教專區</span>
    </div>
    <div class="topbar-right">
      <div class="search-wrapper" id="search-wrapper">
        <button class="topbar-btn search-toggle-btn" id="search-toggle" title="搜尋" aria-label="搜尋">🔍</button>
        <div class="search-box" id="search-box">
          <input type="text" class="search-input" id="search-input" placeholder="搜尋衛教主題…" autocomplete="off">
          <div class="search-results" id="search-results"></div>
        </div>
      </div>
      <div class="font-controls">
        <button class="topbar-btn" id="font-dec" title="縮小字體">A-</button>
        <span class="font-size-label" id="font-label">標準</span>
        <button class="topbar-btn" id="font-inc" title="放大字體">A+</button>
      </div>
      <button class="topbar-btn" id="theme-toggle" title="切換深色模式">🌙</button>
      <div class="lang-switcher" id="lang-switcher">
        <button class="topbar-btn lang-toggle-btn" id="lang-toggle" title="語言切換" aria-label="語言切換">🌐</button>
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-option" data-lang="zh-TW">中文</button>
          <button class="lang-option" data-lang="en">English</button>
          <button class="lang-option" data-lang="vi">Tiếng Việt</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== 側邊欄遮罩 (手機版) ===== -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ===== 側邊欄 (Sidebar) ===== -->
  <nav class="sidebar" id="sidebar" aria-label="衛教主題導航">
    <!-- 收藏區塊 -->
    <div class="sidebar-section" id="sidebar-favorites">
      <div class="sidebar-section-header" id="favorites-header">
        <span class="sidebar-section-icon">⭐</span>
        <span class="sidebar-section-name">我的收藏</span>
        <span class="sidebar-category-arrow">▸</span>
      </div>
      <div class="sidebar-section-body" id="favorites-list">
        <p class="sidebar-section-empty">尚未收藏任何主題</p>
      </div>
    </div>
    <!-- 最近瀏覽區塊 -->
    <div class="sidebar-section" id="sidebar-recent">
      <div class="sidebar-section-header" id="recent-header">
        <span class="sidebar-section-icon">🕐</span>
        <span class="sidebar-section-name">最近瀏覽</span>
        <span class="sidebar-category-arrow">▸</span>
      </div>
      <div class="sidebar-section-body" id="recent-list">
        <p class="sidebar-section-empty">尚未瀏覽任何主題</p>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-nav" id="sidebar-nav">
      <!-- 由 JS 動態生成 -->
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-contact">
      <a class="sidebar-contact-link" id="sidebar-contact-link" href="#/contact">
        <span class="sidebar-contact-icon">📞</span>
        <span class="sidebar-contact-name">聯絡我們</span>
      </a>
    </div>
  </nav>

  <!-- ===== 主內容區 (Main Content) ===== -->
  <main class="main-content" id="main-content">
    <!-- 由 JS 動態渲染 -->
  </main>

  <!-- Scripts -->
  <script src="./js/content.js"></script>
  <script src="./js/app.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
    window.mermaidRender = () => mermaid.run();
  </script>

</body>
</html>
