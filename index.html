<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>工學誠心診所 · 衛教專區</title>
  <meta name="description" content="耳鼻喉科及家醫科衛教資訊平台，提供耳鼻喉科、家醫科、慢性病、兒童、預防醫學、功能醫學等健康照護知識。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Instrument+Serif&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles/main.css" />
  <link rel="icon" href="./assets/logo_pic.jpg" type="image/jpeg" />
</head>

<body>
  <div id="root">Loading…</div>
  <script src="./js/content.js"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    window.mermaid && window.mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'strict',
      theme: 'base',
      fontFamily: '"Noto Sans TC", system-ui, sans-serif',
      flowchart: {
        htmlLabels: false,
        useMaxWidth: true,
        curve: 'linear',
        diagramPadding: 12,
        nodeSpacing: 56,
        rankSpacing: 64,
      },
      themeVariables: {
        fontFamily: '"Noto Sans TC", system-ui, sans-serif',
        fontSize: '14px',
        primaryColor: '#fff8ec',
        primaryTextColor: '#1f3a37',
        primaryBorderColor: '#0e7c7b',
        secondaryColor: '#fde2c8',
        secondaryBorderColor: '#e89661',
        secondaryTextColor: '#5a3a1f',
        tertiaryColor: '#f0f7f4',
        tertiaryBorderColor: '#0e7c7b',
        tertiaryTextColor: '#1f3a37',
        lineColor: '#5a8a82',
        mainBkg: '#fff8ec',
        nodeBkg: '#fff8ec',
        nodeBorder: '#0e7c7b',
        clusterBkg: '#f0f7f4',
        clusterBorder: '#0e7c7b',
        edgeLabelBackground: '#fffaf0',
        defaultLinkColor: '#5a8a82',
      },
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="./dist/app.js"></script>
</body>

</html>
